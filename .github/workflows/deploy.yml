name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build da aplicação (Injeção de Variáveis)
        env:
          VITE_HUWISE_API_KEY: ${{ secrets.VITE_HUWISE_API_KEY }}
          VITE_HUWISE_DOMAIN: ${{ secrets.VITE_HUWISE_DOMAIN }}
          VITE_DATASET_ID: ${{ secrets.VITE_DATASET_ID }}
        run: npm run build

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist